name: Aider AI Coder

on:
  issues:
    types: [opened, edited]

# Grants explicit write access for git commits and issue modifications
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider and required dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Execute Aider to Fix Code
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Set up global Git configurations for the commit agent
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # Run Aider passing down the issue text safely as an environment variable string
          aider --model gemini/gemini-2.5-flash --yes --stream --message "$ISSUE_BODY"

      - name: Push updates back to your branch
        run: |
          # Safely push updates back to your live branch on GitHub
          git push origin HEAD:main || echo "No changes to push"
