name: Aider AI Coder

on:
  issues:
    types: [opened, edited]

jobs:
  aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider and required dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Execute Aider to Fix Code
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Automatically configures Git author details
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Instructs Aider to read the issue text and make updates
          aider --model gemini/gemini-2.5-flash --message "Please resolve this request from GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.body }}"

      - name: Push updates back to your branch
        run: |
          git push origin main
